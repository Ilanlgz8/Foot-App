<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  <!-- Football background -->
  <circle cx="50" cy="50" r="43" fill="#0f1923"/>
  <!-- Football pentagon center -->
  <polygon points="50,22 66,33 60,52 40,52 34,33" fill="#1a2535" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Pentagon top-left -->
  <polygon points="34,33 40,52 26,62 14,50 18,32" fill="#1a2535" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
  <!-- Pentagon top-right -->
  <polygon points="66,33 86,50 74,62 60,52 66,33" fill="#1a2535" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
  <!-- Pentagon bottom-left -->
  <polygon points="40,52 26,62 30,78 50,84 60,70" fill="#1a2535" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
  <!-- Pentagon bottom-right -->
  <polygon points="60,52 74,62 70,78 50,84 60,70" fill="#1a2535" stroke="#ef4444" stroke-width="1.2" opacity="0.6"/>
  <!-- SF text -->
  <text x="50" y="46" text-anchor="middle" font-family="'Arial Black', sans-serif" font-size="19" font-weight="900" fill="#ef4444" letter-spacing="-1">SF</text>
</svg>
