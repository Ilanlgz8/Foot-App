[build]
  command = "npm run build"
  publish = "dist"

# Redirige tous les appels /api/* vers la fonction football.js (côté serveur)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/football"
  status = 200
  force = true

# Redirige /news vers la fonction news.js (côté serveur)
[[redirects]]
  from = "/news"
  to = "/.netlify/functions/news"
  status = 200
  force = true

# Proxy vers api-football.com pour les minutes précises en live
[[redirects]]
  from = "/apifootball"
  to = "/.netlify/functions/apifootball"
  status = 200
  force = true

# Proxy vers ESPN pour les scores en temps réel (fallback : football-data.org)
[[redirects]]
  from = "/espn"
  to = "/.netlify/functions/espn"
  status = 200
  force = true

# Proxy SofaScore : /sofascore?path=... → api.sofascore.com (pas de clé requise)
[[redirects]]
  from = "/sofascore"
  to = "/.netlify/functions/sofascore"
  status = 200
  force = true

# Fallback SPA : toutes les autres routes vers index.html (obligatoire pour React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
